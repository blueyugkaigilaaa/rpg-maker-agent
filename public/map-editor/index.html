<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Map Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
#loading {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; color: #888; font-family: sans-serif; font-size: 14px;
  z-index: 100;
}
#loading.hidden { display: none; }
canvas { display: block; }
</style>
</head>
<body tabindex="0">
<div id="loading">Loading map...</div>
<script src="/map-editor/pixi.min.js"></script>
<script>
// Minimal stubs so rmmz_core.js can define Tilemap, Bitmap, etc.
function Graphics() { throw new Error("Static class"); }
Graphics._width = 816;
Graphics._height = 624;
Graphics.width = 816;
Graphics.height = 624;
Graphics.boxWidth = 816;
Graphics.boxHeight = 624;
Graphics.frameCount = 0;
Graphics._app = null;
Object.defineProperty(Graphics, "app", {
  get() { return this._app; },
  configurable: true
});

// Stub for Number.prototype.mod used by RMMZ
if (!Number.prototype.mod) {
  Number.prototype.mod = function(n) {
    return ((this % n) + n) % n;
  };
}
</script>
<script src="/map-editor/rmmz_core.js"></script>
<script src="/map-editor/editor.js"></script>
</body>
</html>
